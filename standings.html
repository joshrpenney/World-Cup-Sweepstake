<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>World Cup Standings</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#071b3a;
    color:white;
}

.header{
    background:#0d2d63;
    text-align:center;
    padding:25px;
    font-size:32px;
    font-weight:bold;
}

.section{
    max-width:1100px;
    margin:auto;
    padding:15px;
}

.home-btn{
    display:inline-block;
    background:#163a72;
    color:white;
    text-decoration:none;
    padding:12px 20px;
    border-radius:8px;
    margin-bottom:20px;
    font-weight:bold;
}

.card{
    background:#112d5c;
    border-radius:14px;
    overflow:hidden;
    margin-bottom:20px;
    box-shadow:0 4px 12px rgba(0,0,0,.25);
}

.card-title{
    background:#163a72;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#163a72;
    padding:10px;
    font-size:14px;
}

td{
    padding:10px;
    border-bottom:1px solid #34598f;
    text-align:center;
}

.team{
    text-align:left;
    font-weight:bold;
}

.qualify{
    background:rgba(0,200,83,.15);
}

@media(max-width:700px){
    th,td{
        padding:8px 4px;
        font-size:12px;
    }
}

</style>
</head>

<body>

<div class="header">
🏆 World Cup Standings
</div>

<div class="section">

<a href="index.html" class="home-btn">⬅ Back Home</a>

<div class="card">
<div class="card-title">Group A</div>

<table>
<tr>
<th>Pos</th>
<th>Team</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>GD</th>
<th>Pts</th>
</tr>

<tr class="qualify"><td>1</td><td class="team">Mexico</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
<tr class="qualify"><td>2</td><td class="team">South Korea</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
<tr><td>3</td><td class="team">Czechia</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
<tr><td>4</td><td class="team">South Africa</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
</table>
</div>

<div class="card">
<div class="card-title">Group B</div>

<table>
<tr>
<th>Pos</th>
<th>Team</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>GD</th>
<th>Pts</th>
</tr>

<tr class="qualify"><td>1</td><td class="team">Canada</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
<tr class="qualify"><td>2</td><td class="team">Switzerland</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
<tr><td>3</td><td class="team">Bosnia & Herzegovina</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
<tr><td>4</td><td class="team">Qatar</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
</table>
</div>

<!-- Repeat same format for Groups C-L -->

</div>

</body>
</html>

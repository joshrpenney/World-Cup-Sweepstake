<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Group Tables</title>
<style>
body{
font-family:Arial,sans-serif;
background:#081c3a;
color:white;
padding:20px;
}
.card{
background:#102a52;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}
table{
width:100%;
color:white;
}
td,th{
padding:6px;
text-align:left;
}
</style>
</head>
<body>

<h1>📊 Group Tables</h1>

<div class="card">
<h2>Group A</h2>
<table>
<tr><th>Team</th><th>Pts</th></tr>
<tr><td>Mexico</td><td>6</td></tr>
<tr><td>South Korea</td><td>3</td></tr>
<tr><td>Czechia</td><td>1</td></tr>
<tr><td>South Africa</td><td>1</td></tr>
</table>
</div>

</body>
</html>

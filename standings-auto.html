<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Standings</title>

<style>
    .group-note{
    font-size:12px;
    opacity:0.8;
    padding:8px 15px 12px 15px;
    font-style:italic;
}
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#071b3a;
    color:white;
}

.header{
    background:#0d2d63;
    text-align:center;
    padding:25px;
    font-size:32px;
    font-weight:bold;
}

.section{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.home-btn{
    display:inline-block;
    background:#163a72;
    color:white;
    text-decoration:none;
    padding:12px 20px;
    border-radius:8px;
    font-weight:bold;
    margin-bottom:20px;
}

.card{
    background:#112d5c;
    border-radius:14px;
    overflow:hidden;
    margin-bottom:25px;
    box-shadow:0 4px 12px rgba(0,0,0,.25);
}

.card-title{
    background:#163a72;
    padding:15px;
    font-size:26px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#163a72;
    padding:10px;
}

td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,.15);
}

.team{
    text-align:left;
    font-weight:bold;
}

.qualify{
    background:rgba(0,180,120,.20);
}

@media(max-width:700px){
    th,td{
        padding:8px 4px;
        font-size:12px;
    }
}
</style>
</head>

<body>

<div class="header">
🏆 World Cup Standings
</div>

<div class="section">
<a href="index.html" class="home-btn">⬅ Back Home</a>

<div id="tables">
Loading standings...
</div>
</div>

<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTPhSNeUuplO0N4unv8AnAxVF6cdYU_VAch7jd3Majf4XxaILcrHbL4kGpo4jzNPXXty_UfiyKocEeZ/pub?gid=140422248&single=true&output=csv";

fetch(CSV_URL)
.then(response => response.text())
.then(csv => {

    const rows = csv.trim().split(/\r?\n/);

    const groups = {};

    for(let i = 1; i < rows.length; i++){

        const row = rows[i].split(",");

        const group = row[0];

        if(!group) continue;

        if(!groups[group]){
            groups[group] = [];
        }

        groups[group].push({
            team: row[1],
            p: Number(row[2]) || 0,
            w: Number(row[3]) || 0,
            d: Number(row[4]) || 0,
            l: Number(row[5]) || 0,
            gf: Number(row[6]) || 0,
            ga: Number(row[7]) || 0,
            gd: Number(row[8]) || 0,
            pts: Number(row[9]) || 0
        });
    }

    let html = "";

    Object.keys(groups).sort().forEach(group => {

        groups[group].sort((a,b) =>
            b.pts - a.pts ||
            b.gd - a.gd ||
            b.gf - a.gf
        );

        html += `
        <div class="card">
            <div class="card-title">Group ${group}</div>
<div class="group-note">
Teams tied on points are ranked by Head-to-Head record (but shown here by GD).
</div>

            <table>
                <tr>
                    <th>Pos</th>
                    <th>Team</th>
                    <th>P</th>
                    <th>W</th>
                    <th>D</th>
                    <th>L</th>
                    <th>GF</th>
                    <th>GA</th>
                    <th>GD</th>
                    <th>Pts</th>
                </tr>
        `;

        groups[group].forEach((team,index) => {

            html += `
            <tr class="${index < 2 ? 'qualify' : ''}">
                <td>${index + 1}</td>
                <td class="team">${team.team}</td>
                <td>${team.p}</td>
                <td>${team.w}</td>
                <td>${team.d}</td>
                <td>${team.l}</td>
                <td>${team.gf}</td>
                <td>${team.ga}</td>
                <td>${team.gd}</td>
                <td>${team.pts}</td>
            </tr>
            `;
        });

        html += `
            </table>
        </div>
        `;
    });

    document.getElementById("tables").innerHTML = html;

})
.catch(error => {
    document.getElementById("tables").innerHTML =
        "<h2>Could not load standings data.</h2>";
    console.error(error);
});

</script>

</body>
</html>

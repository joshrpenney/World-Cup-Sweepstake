<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>World Cup Bracket</title>

<style>

    background:#0b1f4b;
    color:white;
    font-family:Arial,sans-serif;
}

.header{
    text-align:center;
    padding:20px;
    background:#12306f;
}

.header h1{
    margin:0;
    font-size:32px;
}

.round{
    background:#173b82;
    margin:20px;
    padding:20px;
    border-radius:20px;
}

.round h2{

    margin-top:0;
}

.match{
    background:#214a9a;
    border-radius:12px;
    padding:12px;
    margin:15px 0;
}

.team{
    padding:6px 0;
    font-size:18px;
}

.vs{
    text-align:center;
    color:#ffd54f;
    font-weight:bold;
    margin:6px 0;
}

</style>

</head>

<body>

<div class="header">
<h1>🏆 Knockout Bracket</h1>

</div>

<div class="round">

<div class="match">

<div class="match">

<div class="match">

<div class="match">
Winner Match 1
</div>

<div class="match">

</div>

</div>

<div class="round">

</div>

</div>

<div class="round">

<h2>Semi Finals</h2>

<div class="match">
Winner Quarter Final
</div>

</div>

<div class="round">

<h2>🏆 Final</h2>

<div class="match">
Champion
</div>

</div>

</html>
